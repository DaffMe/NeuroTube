version: "3.9"

services:
  # ─── Infrastructure ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: neurotube-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neurotube}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neurotube_secret}
      POSTGRES_DB: ${POSTGRES_DB:-neurotube}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurotube"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: neurotube-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Go Data Fetcher ───────────────────────────────────────────
  backend-fetcher:
    build:
      context: ./backend-fetcher
      dockerfile: Dockerfile
    container_name: neurotube-fetcher
    restart: unless-stopped
    ports:
      - "${FETCHER_PORT:-8080}:8080"
    environment:
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      REDIS_URL: redis://redis:6379/0
      PORT: "8080"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    depends_on:
      redis:
        condition: service_healthy

  # ─── Python ML Engine ──────────────────────────────────────────
  backend-ml:
    build:
      context: ./backend-ml
      dockerfile: Dockerfile
    container_name: neurotube-ml
    restart: unless-stopped
    ports:
      - "${ML_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-neurotube}:${POSTGRES_PASSWORD:-neurotube_secret}@postgres:5432/${POSTGRES_DB:-neurotube}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend Dev Server ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neurotube-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_FETCHER_API_URL: http://localhost:${FETCHER_PORT:-8080}
      VITE_ML_API_URL: http://localhost:${ML_PORT:-8000}
    depends_on:
      - backend-fetcher
      - backend-ml
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
